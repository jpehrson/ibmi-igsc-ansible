---
################################################################################
# Ansible Inventory for IBM i WebSphere Deployment Automation
#
# This inventory defines:
# - template_systems: Source system for creating WAS save files
# - Managed nodes grouped by environment (dev, test, prod)
# - Each host has a config_file variable mapping to its deployment config
#
# Usage:
#   ansible-playbook playbooks/main.yml -e "target_env=dev"
#   ansible-playbook playbooks/main.yml -e "target_env=prod"
#   ansible-playbook playbooks/main.yml --limit ibmi-dev1
################################################################################

all:
  children:
    # Template system - source for WAS save files
    # This system should have a fully configured WAS profile
    template_systems:
      hosts:
       vk4060:
          ansible_host: VK4060.zuerich-vk.ch.ibm.com
          ansible_user: jpehrson
          # Using SSH key authentication (ECDSA-521)
          ansible_ssh_private_key_file: ~/.ssh/id_ecdsa
          # Password authentication disabled - using SSH key only
          # ansible_ssh_pass: "{{ vault_vk4060_password }}"
          config_file: DEVOPS02_deployment.config
          profile_name: WASPRODS
       
          # Template system configuration
          was_profile_path: /QIBM/UserData/WebSphere/AppServer/V9/Base
          save_lib: IBM2
          profile_savf: WASPRODS
          http_dir_savf: WEBPRODS1
          http_cfg_savf: WEBPRODS2
          http_server: WEBPRODS
          ias_save_files: [IASPRODS]
          ias_server_names: [IASPRODS]
          # Template config file for was_save.sh (filename only, path is in was_save_configs_dir)
          template_config: DEVOPS02.config
    
    # Development Environment
    dev:
      hosts:
        ibmi-dev1:
          ansible_host: 10.1.2.101
          ansible_user: qsecofr
          ansible_ssh_pass: "{{ vault_dev1_password }}"
          # Deployment configuration file for this host
          config_file: dev1_deployment.config
          profile_name: WASPRODS
          http_server: WEBPRODS
        
        ibmi-dev2:
          ansible_host: 10.1.2.102
          ansible_user: qsecofr
          ansible_ssh_pass: "{{ vault_dev2_password }}"
          config_file: dev2_deployment.config
          profile_name: WASPRODS
          http_server: WEBPRODS
    
    # Test Environment
    test:
      hosts:
        vk4060:
          ansible_host: VK4060.zuerich-vk.ch.ibm.com
          ansible_user: jpehrson
          # Using SSH key authentication (ECDSA-521)
          ansible_ssh_private_key_file: ~/.ssh/id_ecdsa
          # Password authentication disabled - using SSH key only
          # ansible_ssh_pass: "{{ vault_vk4060_password }}"
          config_file: vk4060_deployment.config
          profile_name: WASPRODS
          http_server: WEBPRODS
        
        ibmi-test1:
          ansible_host: 10.1.3.101
          ansible_user: qsecofr
          ansible_ssh_pass: "{{ vault_test1_password }}"
          config_file: test1_deployment.config
          profile_name: WASPRODS
          http_server: WEBPRODS
        
        ibmi-test2:
          ansible_host: 10.1.3.102
          ansible_user: qsecofr
          ansible_ssh_pass: "{{ vault_test2_password }}"
          config_file: test2_deployment.config
          profile_name: WASPRODS
          http_server: WEBPRODS
    
    # Production Environment
    prod:
      hosts:
        ibmi-prod1:
          ansible_host: 10.1.4.101
          ansible_user: qsecofr
          ansible_ssh_pass: "{{ vault_prod1_password }}"
          config_file: prod1_deployment.config
          profile_name: WASPRODS
          http_server: WEBPRODS
        
        ibmi-prod2:
          ansible_host: 10.1.4.102
          ansible_user: qsecofr
          ansible_ssh_pass: "{{ vault_prod2_password }}"
          config_file: prod2_deployment.config
          profile_name: WASPRODS
          http_server: WEBPRODS

################################################################################
# Notes:
#
# 1. Passwords should be encrypted using ansible-vault:
#    ansible-vault encrypt_string 'your_password' --name 'vault_dev1_password'
#
# 2. Each host must have a corresponding config_file in the configs/ directory
#
# 3. The template_systems group should contain only one host that has a
#    fully configured WAS profile to use as the source for save files
#
# 4. To target specific environments:
#    ansible-playbook playbooks/main.yml -e "target_env=dev"
#
# 5. To target specific hosts:
#    ansible-playbook playbooks/main.yml --limit ibmi-dev1
#
# 6. Group variables are defined in inventory/group_vars/
################################################################################

