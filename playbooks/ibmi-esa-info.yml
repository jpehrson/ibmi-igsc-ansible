################################################################################
# Notes:
#
# 1. QSYS2.ELECTRONIC_SERVICE_AGENT_INFO provides ESA connection and status info
# 2. Requires *READ authority to the view
# 3. ESA must be configured for data to be available
# 4. Column structure may vary by IBM i version and PTF level
# 5. Use ibmi-esa-discover-columns.yml to discover available columns
# 6. Use -e "output_format=json" for JSON output
# 7. Use -e "save_to_file=true" to save results to a file
#
# Available Columns (as of this system):
#   - ESA_STATUS, ESA_CONNECTION
#   - PROXY_HOST_OR_IP, PROXY_PORT, PROXY_ID
#   - RESULT_BY_IP_ADDRESS, RESULT_BY_HOSTNAME
#   - SERVER_TYPE, SERVER_HOSTNAME, SERVER_IP_ADDRESS, SERVER_PORT
#
# Example Commands:
#   ansible-playbook playbooks/ibmi-esa-info.yml
#   ansible-playbook playbooks/ibmi-esa-info.yml -e "output_format=json"
#   ansible-playbook playbooks/ibmi-esa-info.yml -e "save_to_file=true"
#   ansible-playbook playbooks/ibmi-esa-info.yml --limit vk4060
#
